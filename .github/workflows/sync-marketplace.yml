name: Sync version to marketplace

on:
  push:
    tags:
      - 'v*'

jobs:
  sync-marketplace:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout marketplace repo
        uses: actions/checkout@v4
        with:
          repository: bluejayA/devflow-marketplace
          token: ${{ secrets.DEVFLOW_MARKET }}
          path: marketplace

      - name: Update marketplace.json
        run: |
          cd marketplace
          jq --arg ver "${{ steps.version.outputs.version }}" \
            '(.plugins[] | select(.name == "reverse-engineering")).version = $ver' \
            .claude-plugin/marketplace.json > tmp.json \
            && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit and push
        run: |
          cd marketplace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --staged --quiet || \
            git commit -m "chore: sync reverse-engineering version to ${{ steps.version.outputs.version }}" \
            && git push
